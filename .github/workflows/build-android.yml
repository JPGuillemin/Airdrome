name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write  # Needed to upload release assets

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: |
          if [ -f VERSION ]; then
            source VERSION
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Building version: $VERSION"
          else
            echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "VERSION file not found, using commit SHA"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install

      - name: Build Vue app
        run: yarn build
        env:
          BASE_PATH: /
          VERSION: ${{ steps.version.outputs.version }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android APK
        working-directory: android
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Rename and prepare APK
        run: |
          SRC=android/app/build/outputs/apk/release/app-release.apk
          DST=airdrome-${{ steps.version.outputs.version }}.apk
          cp "$SRC" "$DST"
          echo "APK built: $DST"
          echo "apk_path=$DST" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: airdrome-${{ steps.version.outputs.version }}
          path: airdrome-${{ steps.version.outputs.version }}.apk
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: airdrome-${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
